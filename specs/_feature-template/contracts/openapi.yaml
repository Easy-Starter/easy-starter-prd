openapi: 3.1.0
info:
  title: Feature API
  version: 0.1.0
paths:
  /example:
    get:
      summary: Example endpoint
      operationId: getExample
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required: [message]
components:
  schemas:
    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
      required: [code, message]
